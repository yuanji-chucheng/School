<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>管理员登录 - 校园二手平台</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<nav class="navbar"><a class="logo" href="index.html">校园二手 & 互助</a></nav>
<div class="login-wrap card">
    <h2 style="text-align:center;margin-bottom:20px;">管理员登录</h2>
    <div id="msg"></div>
    <div class="form-group"><label>管理员账号</label><input id="studentId" placeholder="请输入管理员账号"></div>
    <div class="form-group"><label>密码</label><input id="password" type="password" placeholder="请输入密码"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="doLogin()">登录</button>
    <p style="text-align:center;margin-top:12px;"><a href="login.html">返回学生登录</a></p>
</div>
<script src="js/api.js"></script>
<script>
async function doLogin() {
    try {
        const res = await AuthAPI.login({
            studentId: document.getElementById('studentId').value,
            password: document.getElementById('password').value,
            loginType: 'admin'
        });
        saveAuth(res.data);
        location.href = 'admin-panel.html';
    } catch (e) { showMsg(document.getElementById('msg'), e.message, true); }
}
</script>
</body>
</html>
