<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>互助详情</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<nav class="navbar">
    <a class="logo" href="index.html">校园二手 & 互助</a>
    <div class="nav-links" id="nav-links"></div>
</nav>
<div class="container">
    <div class="card" id="report-panel" style="display:none;border-left:4px solid #e6a23c;">
        <div class="card-title">举报处理</div>
        <p id="report-info"></p>
        <button class="btn btn-danger" onclick="handleReport('REMOVE')">审核下架</button>
        <button class="btn btn-success" onclick="handleReport('NO_VIOLATION')">审核无违规</button>
    </div>
    <div class="card" id="detail"></div>
    <div class="card" id="edit-panel" style="display:none;">
        <div class="card-title">修改帖子</div>
        <div class="form-group"><label>标题</label><input id="edit-title"></div>
        <div class="form-group"><label>描述</label><textarea id="edit-description"></textarea></div>
        <div class="form-group"><label>酬劳(元)</label><input id="edit-reward" type="number" step="0.01"></div>
        <div class="form-group">
            <label>订单备注</label>
            <textarea id="edit-orderNote" placeholder="仅接单者接单后可看到"></textarea>
        </div>
        <button class="btn btn-primary" onclick="saveEdit()">保存修改</button>
        <button class="btn btn-default" onclick="cancelEdit()">取消</button>
    </div>
    <div class="card" id="order-info" style="display:none;"></div>
    <div class="card" id="actions"></div>
</div>
<div id="review-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:99;">
    <div class="card" style="max-width:400px;margin:100px auto;">
        <div class="card-title">互助评价</div>
        <input type="hidden" id="rv-orderId"><input type="hidden" id="rv-revieweeId">
        <div class="form-group"><label>评分(1-5)</label><input id="rv-rating" type="number" min="1" max="5" value="5"></div>
        <div class="form-group"><label>评价内容</label><textarea id="rv-content"></textarea></div>
        <button class="btn btn-primary" onclick="submitReview()">提交</button>
    </div>
</div>
<script src="js/api.js"></script>
<script>
renderNav();
const id = new URLSearchParams(location.search).get('id');
const reportId = new URLSearchParams(location.search).get('reportId');
const user = getUser();
let helpOrder = null;
let helpData = null;

function renderDetail(h) {
    document.getElementById('detail').innerHTML = `
        <h2>${h.title}</h2>
        <p><span class="tag">酬劳 ¥${h.reward || 0}</span>
           <span class="tag status-${h.status}">${STATUS_MAP.help[h.status]}</span></p>
        <p>${h.description || ''}</p>
        <p style="color:#999;">发布者：${h.publisherNickname}</p>`;
}

function showEditForm() {
    document.getElementById('edit-title').value = helpData.title;
    document.getElementById('edit-description').value = helpData.description || '';
    document.getElementById('edit-reward').value = helpData.reward || 0;
    document.getElementById('edit-orderNote').value = helpData.orderNote || '';
    document.getElementById('edit-panel').style.display = 'block';
    document.getElementById('detail').style.display = 'none';
}

function cancelEdit() {
    document.getElementById('edit-panel').style.display = 'none';
    document.getElementById('detail').style.display = 'block';
}

async function saveEdit() {
    try {
        const res = await HelpAPI.update(id, {
            title: document.getElementById('edit-title').value,
            description: document.getElementById('edit-description').value,
            reward: parseFloat(document.getElementById('edit-reward').value),
            orderNote: document.getElementById('edit-orderNote').value
        });
        helpData = res.data;
        renderDetail(helpData);
        cancelEdit();
        alert('修改成功');
        location.reload();
    } catch (e) { alert(e.message); }
}

async function fetchOrder() {
    if (helpData.status < 2) return;
    try {
        const oRes = await HelpAPI.getOrder(id);
        helpOrder = oRes.data;
        if (helpOrder) {
            document.getElementById('order-info').style.display = 'block';
            document.getElementById('order-info').innerHTML = `
                <div class="card-title">接单详情</div>
                <p>接单者：${helpOrder.helperNickname}</p>
                <p>接单时间：${helpOrder.createTime || ''}</p>
                <p>状态：<span class="tag status-${helpOrder.status}">${helpOrder.status === 2 ? '已完成' : '进行中'}</span></p>`;
        }
    } catch(e) {}
}

function renderActions() {
    let actions = '';
    if (user && helpData.status === 1 && helpData.userId !== user.userId) {
        actions = `<button class="btn btn-primary" onclick="acceptHelp()">接单</button>`;
    }
    if (user && helpData.status === 2 && helpOrder && helpOrder.helperId === user.userId) {
        actions = `<button class="btn btn-success" onclick="completeHelp()">已完成</button>`;
    }
    if (user && helpData.status === 1 && helpData.userId === user.userId) {
        actions = `<button class="btn btn-danger" onclick="cancelHelp()">取消需求</button>`;
    }
    if (user && helpData.userId === user.userId) {
        actions += ` <button class="btn btn-primary" onclick="showEditForm()">修改帖子</button>`;
    }
    if (user && helpData.userId !== user.userId && !(user.role === 1 && reportId)) {
        actions += `<button class="btn btn-warning" onclick="reportHelp()">举报</button>`;
    }
    if (helpData.status === 3) {
        try {
            if (!helpOrder) {
                const oRes = HelpAPI.getOrder(id);
                helpOrder = oRes.data;
            }
            if (user && helpOrder) {
                const reviewee = user.userId === helpData.userId ? helpOrder.helperId : helpData.userId;
                actions = `<button class="btn btn-warning" onclick="openReview(${helpOrder.id},${reviewee})">评价对方</button>`;
            }
        } catch(e) {}
    }
    document.getElementById('actions').innerHTML = actions;
}

(async () => {
    const res = await HelpAPI.detail(id);
    helpData = res.data;
    renderDetail(helpData);

    await fetchOrder();

    if (user && user.role === 1 && reportId) {
        const rRes = await ReportAPI.detail(reportId);
        const r = rRes.data;
        document.getElementById('report-panel').style.display = 'block';
        document.getElementById('report-info').innerHTML =
            `举报人：${r.reporterNickname} | 原因：${r.reason}`;
    }

    renderActions();
})();

async function acceptHelp() {
    if (!requireLogin()) return;
    try { await HelpAPI.accept(id); alert('接单成功'); location.reload(); }
    catch (e) { alert(e.message); }
}
async function completeHelp() {
    try { await HelpAPI.complete(id); alert('已标记完成，已通知帖主'); location.reload(); }
    catch (e) { alert(e.message); }
}
async function cancelHelp() {
    try { await HelpAPI.cancel(id); alert('已取消'); location.reload(); }
    catch (e) { alert(e.message); }
}
async function reportHelp() {
    if (!requireLogin()) return;
    const reason = prompt('请输入举报原因：');
    if (!reason) return;
    try {
        await ReportAPI.submit({ targetType: 'HELP', targetId: parseInt(id), reason });
        alert('举报已提交');
    } catch (e) { alert(e.message); }
}
async function handleReport(action) {
    const label = action === 'REMOVE' ? '审核下架' : '审核无违规';
    if (!confirm(`确定执行「${label}」？`)) return;
    try {
        await ReportAPI.handle(reportId, action);
        alert('处理成功，已通知发布者和举报者');
        location.href = 'admin-panel.html';
    } catch (e) { alert(e.message); }
}
function openReview(orderId, revieweeId) {
    document.getElementById('rv-orderId').value = orderId;
    document.getElementById('rv-revieweeId').value = revieweeId;
    document.getElementById('review-modal').style.display = 'block';
}
async function submitReview() {
    try {
        await HelpAPI.review(parseInt(document.getElementById('rv-orderId').value), {
            revieweeId: parseInt(document.getElementById('rv-revieweeId').value),
            rating: parseInt(document.getElementById('rv-rating').value),
            content: document.getElementById('rv-content').value
        });
        alert('评价成功');
        document.getElementById('review-modal').style.display = 'none';
    } catch (e) { alert(e.message); }
}
</script>
</body>
</html>
