<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册 - 校园二手平台</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<nav class="navbar"><a class="logo" href="index.html">校园二手 & 互助</a></nav>
<div class="login-wrap card">
    <h2 style="text-align:center;margin-bottom:20px;">学生注册</h2>
    <div id="msg"></div>
    <div class="form-group"><label>学号</label><input id="studentId" placeholder="请输入学号"></div>
    <div class="form-group"><label>昵称</label><input id="nickname" placeholder="请输入昵称"></div>
    <div class="form-group"><label>密码</label><input id="password" type="password" placeholder="请输入密码"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="doRegister()">注册</button>
    <p style="text-align:center;margin-top:12px;">已有账号？<a href="login.html">去登录</a></p>
    <p style="text-align:center;color:#999;font-size:12px;">注册后需管理员审核通过方可登录</p>
</div>
<script src="js/api.js"></script>
<script>
async function doRegister() {
    try {
        await AuthAPI.register({
            studentId: document.getElementById('studentId').value,
            nickname: document.getElementById('nickname').value,
            password: document.getElementById('password').value
        });
        showMsg(document.getElementById('msg'), '注册成功，请等待管理员审核', false);
    } catch (e) { showMsg(document.getElementById('msg'), e.message, true); }
}
</script>
</body>
</html>
