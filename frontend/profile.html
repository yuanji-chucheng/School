<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<nav class="navbar">
    <a class="logo" href="index.html">校园二手 & 互助</a>
    <div class="nav-links" id="nav-links"></div>
</nav>
<div class="container">
    <div class="card" id="profile-info"></div>
    <div class="card">
        <div class="card-title">我发布的二手物品</div>
        <div id="my-items"></div>
    </div>
    <div class="card">
        <div class="card-title">我发布的互助帖子</div>
        <div id="my-help"></div>
    </div>
    <div class="card">
        <div class="card-title">系统通知 <span id="notify-badge" style="display:none;" class="unread-badge"></span> <button class="btn btn-default" onclick="markAllRead()">全部已读</button></div>
        <div id="notifications"></div>
    </div>
</div>
<script src="js/api.js"></script>
<script>
if (!requireLogin()) throw '';
renderNav();

async function loadProfile() {
    const res = await UserAPI.profile();
    const u = res.data;
    document.getElementById('profile-info').innerHTML = `
        <div class="card-title">个人信息</div>
        <p>学号：${u.studentId} | 昵称：${u.nickname} | 信用分：${u.creditScore}</p>
        <p>角色：${u.role === 1 ? '管理员' : '学生'} | 状态：${STATUS_MAP.user[u.status]}</p>
        <div class="form-group"><label>修改昵称</label><input id="nickname" value="${u.nickname}"></div>
        <button class="btn btn-primary" onclick="updateProfile()">保存</button>`;

    const myItems = await ItemAPI.search({ sellerId: u.id, page: 1, size: 20 });
    document.getElementById('my-items').innerHTML = myItems.rows.map(i =>
        `<div class="post-list-item">
            <a href="item-detail.html?id=${i.id}">${i.title}</a>
            <span>¥${i.price} <span class="tag status-${i.status}">${STATUS_MAP.item[i.status]}</span></span>
        </div>`
    ).join('') || '<p>暂无发布</p>';

    const myHelp = await HelpAPI.list({ userId: u.id, page: 1, size: 20 });
    document.getElementById('my-help').innerHTML = myHelp.rows.map(h =>
        `<div class="post-list-item">
            <a href="help-detail.html?id=${h.id}">${h.title}</a>
            <span>酬劳 ¥${h.reward || 0} <span class="tag status-${h.status}">${STATUS_MAP.help[h.status]}</span></span>
        </div>`
    ).join('') || '<p>暂无发布</p>';
}

loadProfile();

async function updateProfile() {
    try {
        const nickname = document.getElementById('nickname').value;
        await UserAPI.updateProfile({ nickname });
        const user = getUser();
        user.nickname = nickname;
        saveAuth({ ...user, token: getToken() });
        location.reload();
    } catch (e) { alert(e.message); }
}
let notifyRefreshTimer = null;

async function loadNotifications() {
    const data = await NotificationAPI.list(1, 20);
    const unreadCount = data.rows.filter(n => !n.isRead).length;
    const badge = document.getElementById('notify-badge');
    if (unreadCount > 0) {
        badge.textContent = unreadCount;
        badge.style.display = 'inline-block';
    } else {
        badge.style.display = 'none';
    }
    document.getElementById('notifications').innerHTML = data.rows.map(n =>
        `<div style="padding:8px 0;border-bottom:1px solid #eee;${n.isRead?'':'background:#fff3f3;'}">
            <strong>${n.title}</strong> - ${n.content}
            <span style="color:#999;font-size:12px;">${n.createTime}</span>
            ${!n.isRead ? '<span class="tag" style="background:#f56c6c;color:white;">未读</span>' : ''}
        </div>`).join('') || '<p>暂无通知</p>';
}

async function markAllRead() {
    await NotificationAPI.markAllRead();
    loadNotifications();
    refreshNavBadge();
}

function startNotifyRefresh() {
    notifyRefreshTimer = setInterval(async () => {
        try {
            await loadNotifications();
        } catch (e) {}
    }, 5000);
}

function stopNotifyRefresh() {
    if (notifyRefreshTimer) {
        clearInterval(notifyRefreshTimer);
        notifyRefreshTimer = null;
    }
}

window.addEventListener('beforeunload', stopNotifyRefresh);

async function init() {
    await loadNotifications();
    await markAllRead();
    startNotifyRefresh();
}

init();
</script>
</body>
</html>
