<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发布互助需求</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<nav class="navbar">
    <a class="logo" href="index.html">校园二手 & 互助</a>
    <div class="nav-links" id="nav-links"></div>
</nav>
<div class="container">
    <div class="card" style="max-width:600px;">
        <div class="card-title">发布互助需求</div>
        <div id="msg"></div>
        <div class="form-group"><label>标题</label><input id="title" placeholder="如：代取快递"></div>
        <div class="form-group"><label>描述</label><textarea id="description"></textarea></div>
        <div class="form-group"><label>酬劳(元)</label><input id="reward" type="number" step="0.01" value="0"></div>
        <button class="btn btn-primary" onclick="publish()">发布</button>
    </div>
</div>
<script src="js/api.js"></script>
<script>
if (!requireLogin()) throw '';
renderNav();
async function publish() {
    try {
        await HelpAPI.publish({
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
            reward: document.getElementById('reward').value
        });
        showMsg(document.getElementById('msg'), '发布成功', false);
    } catch (e) { showMsg(document.getElementById('msg'), e.message, true); }
}
</script>
</body>
</html>
