<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发布互助需求</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<nav class="navbar">
    <a class="logo" href="index.html">校园二手 & 互助</a>
    <div class="nav-links" id="nav-links"></div>
</nav>
<div class="container">
    <div class="card" style="max-width:600px;">
        <div class="card-title">发布互助需求</div>
        <div id="msg"></div>
        <div class="form-group"><label>标题</label><input id="title" placeholder="如：代取快递"></div>
        <div class="form-group"><label>描述</label><textarea id="description"></textarea></div>
        <div class="form-group"><label>酬劳(元)</label><input id="reward" type="number" step="0.01" min="0"></div>
        <div class="form-group">
            <label>订单备注</label>
            <textarea id="orderNote" placeholder="仅接单者接单后可看到，不在公共帖子显示"></textarea>
            <p style="color:#999;font-size:12px;margin-top:4px;">此备注不会在互助列表公开展示，接单后接单者可见，您可随时修改</p>
        </div>
        <button class="btn btn-primary" onclick="publish()">发布</button>
    </div>
</div>
<script src="js/api.js"></script>
<script>
if (!requireLogin()) throw '';
renderNav();
async function publish() {
    const title = document.getElementById('title').value.trim();
    const description = document.getElementById('description').value.trim();
    const rewardVal = document.getElementById('reward').value;
    if (!title) { alert('标题不能为空'); return; }
    if (!description) { alert('描述不能为空'); return; }
    if (rewardVal === '' || rewardVal === null) { alert('酬劳不能为空'); return; }
    const reward = parseFloat(rewardVal);
    if (isNaN(reward) || reward < 0) { alert('酬劳必须大于等于0'); return; }
    try {
        await HelpAPI.publish({
            title, description, reward,
            orderNote: document.getElementById('orderNote').value.trim()
        });
        showMsg(document.getElementById('msg'), '发布成功，等待管理员审核', false);
    } catch (e) { showMsg(document.getElementById('msg'), e.message, true); }
}
</script>
</body>
</html>
