<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>物品详情</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
<nav class="navbar">
    <a class="logo" href="index.html">校园二手 & 互助</a>
    <div class="nav-links" id="nav-links"></div>
</nav>
<div class="container" id="page-content">
    <div class="card" id="report-panel" style="display:none;border-left:4px solid #e6a23c;">
        <div class="card-title">举报处理</div>
        <p id="report-info"></p>
        <button class="btn btn-danger" onclick="handleReport('REMOVE')">审核下架</button>
        <button class="btn btn-success" onclick="handleReport('NO_VIOLATION')">审核无违规</button>
    </div>
    <div class="card" id="detail"></div>
    <div class="card" id="edit-panel" style="display:none;">
        <div class="card-title">修改帖子</div>
        <div id="edit-msg"></div>
        <div class="form-group"><label>标题</label><input id="edit-title"></div>
        <div class="form-group"><label>描述</label><textarea id="edit-description"></textarea></div>
        <div class="form-group"><label>价格</label><input id="edit-price" type="number" step="0.01"></div>
        <div class="form-group"><label>分类</label><select id="edit-category"></select></div>
        <div class="form-group">
            <label>新旧程度(1-5)</label>
            <input id="edit-conditionLevel" type="number" min="1" max="5" placeholder="请输入1-5之间的整数">
            <div id="edit-conditionError" class="field-error"></div>
        </div>
        <div class="form-group">
            <label>图片（最多6张）</label>
            <div class="image-upload-area" id="edit-image-area">
                <div class="image-add-btn" id="edit-add-image-btn" onclick="openEditUploadModal()">+</div>
            </div>
        </div>
        <button class="btn btn-primary" onclick="saveEdit()">保存修改</button>
        <button class="btn btn-default" onclick="cancelEdit()">取消</button>
    </div>
    <div class="card" id="actions"></div>
</div>

<!-- 文件上传弹窗 -->
<div class="modal-overlay" id="edit-upload-modal">
    <div class="modal-box">
        <div class="modal-title">选择图片</div>
        <p style="color:#666;font-size:13px;margin-bottom:12px;">从本地选择图片，最多6张，单张不超过5MB</p>
        <input type="file" id="edit-file-input" accept="image/*" multiple style="margin-bottom:16px;">
        <div id="edit-modal-preview" class="image-upload-area" style="margin-bottom:16px;"></div>
        <div style="text-align:right;">
            <button class="btn btn-primary" onclick="confirmEditUpload()">完成</button>
            <button class="btn btn-default" onclick="closeEditUploadModal()">关闭</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
renderNav();
const id = new URLSearchParams(location.search).get('id');
const reportId = new URLSearchParams(location.search).get('reportId');
const user = getUser();
let itemData = null;
let editUploadedImages = [];
let editModalOpen = false;
let editPendingFiles = [];

CATEGORIES.forEach(c => {
    document.getElementById('edit-category').innerHTML += `<option>${c}</option>`;
});

function setPageBlocked(blocked) {
    document.getElementById('page-content').classList.toggle('modal-blocked', blocked);
}

function openEditUploadModal() {
    if (editUploadedImages.length >= 6) { alert('最多上传6张图片'); return; }
    editModalOpen = true;
    editPendingFiles = [];
    document.getElementById('edit-file-input').value = '';
    document.getElementById('edit-modal-preview').innerHTML = '';
    document.getElementById('edit-upload-modal').classList.add('show');
    setPageBlocked(true);
}

function closeEditUploadModal() {
    editModalOpen = false;
    document.getElementById('edit-upload-modal').classList.remove('show');
    setPageBlocked(false);
}

document.getElementById('edit-file-input').addEventListener('change', function(e) {
    editPendingFiles = Array.from(e.target.files);
    const remain = 6 - editUploadedImages.length;
    if (editPendingFiles.length > remain) {
        alert(`最多还能选择${remain}张图片`);
        editPendingFiles = editPendingFiles.slice(0, remain);
    }
    document.getElementById('edit-modal-preview').innerHTML = editPendingFiles.map((f, i) =>
        `<div class="image-thumb"><img src="${URL.createObjectURL(f)}" alt="预览${i+1}"></div>`
    ).join('');
});

async function confirmEditUpload() {
    if (editPendingFiles.length === 0) { alert('请先选择图片'); return; }
    try {
        for (const file of editPendingFiles) {
            if (editUploadedImages.length >= 6) break;
            const url = await uploadFile(file);
            editUploadedImages.push(url);
        }
        renderEditImages();
        closeEditUploadModal();
    } catch (e) { alert(e.message); }
}

function renderEditImages() {
    const area = document.getElementById('edit-image-area');
    area.innerHTML = editUploadedImages.map((url, i) =>
        `<div class="image-thumb"><img src="${url}"><button class="remove-btn" onclick="removeEditImage(${i})">×</button></div>`
    ).join('');
    if (editUploadedImages.length < 6) {
        area.innerHTML += `<div class="image-add-btn" onclick="openEditUploadModal()">+</div>`;
    }
}

function removeEditImage(index) {
    editUploadedImages.splice(index, 1);
    renderEditImages();
}

function renderDetail(i) {
    const imgs = (i.images || '').split(',').filter(Boolean);
    document.getElementById('detail').innerHTML = `
        <h2>${i.title}</h2>
        <p style="color:#f56c6c;font-size:24px;font-weight:bold;">¥${i.price}</p>
        <p><span class="tag">${i.category}</span> <span class="tag">新旧 ${i.conditionLevel}/5</span>
           <span class="tag status-${i.status}">${STATUS_MAP.item[i.status]}</span></p>
        <div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;">
            ${imgs.map(u => `<img src="${u}" style="width:200px;height:150px;object-fit:cover;border-radius:4px;">`).join('')}
        </div>
        <p>${i.description || '暂无描述'}</p>
        <p style="color:#999;">卖家：${i.sellerNickname} | 发布时间：${i.createTime}</p>`;
}

function validateEditCondition() {
    const input = document.getElementById('edit-conditionLevel');
    const errEl = document.getElementById('edit-conditionError');
    const val = input.value.trim();
    input.classList.remove('input-error');
    errEl.textContent = '';
    if (val === '') {
        input.classList.add('input-error');
        errEl.textContent = '请填写新旧程度（1-5）';
        return false;
    }
    const num = parseInt(val, 10);
    if (isNaN(num)) {
        input.classList.add('input-error');
        errEl.textContent = '新旧程度必须为整数';
        return false;
    }
    if (!Number.isInteger(num)) {
        input.classList.add('input-error');
        errEl.textContent = '新旧程度必须为整数';
        return false;
    }
    if (num < 1) {
        input.classList.add('input-error');
        errEl.textContent = '新旧程度不能小于1，最低为1（全新）';
        return false;
    }
    if (num > 5) {
        input.classList.add('input-error');
        errEl.textContent = '新旧程度不能大于5，最高为5（较旧）';
        return false;
    }
    return true;
}

document.getElementById('edit-conditionLevel').addEventListener('input', validateEditCondition);
document.getElementById('edit-conditionLevel').addEventListener('blur', validateEditCondition);

function showEditForm() {
    document.getElementById('edit-title').value = itemData.title;
    document.getElementById('edit-description').value = itemData.description || '';
    document.getElementById('edit-price').value = itemData.price;
    document.getElementById('edit-category').value = itemData.category;
    document.getElementById('edit-conditionLevel').value = itemData.conditionLevel;
    editUploadedImages = (itemData.images || '').split(',').filter(Boolean);
    renderEditImages();
    document.getElementById('edit-panel').style.display = 'block';
    document.getElementById('detail').style.display = 'none';
}

function cancelEdit() {
    document.getElementById('edit-panel').style.display = 'none';
    document.getElementById('detail').style.display = 'block';
}

async function saveEdit() {
    if (editModalOpen) { alert('请先完成图片选择并关闭上传弹窗'); return; }
    if (!validateEditCondition()) {
        showMsg(document.getElementById('edit-msg'), '填写错误，请重新填写', true);
        return;
    }
    const priceVal = document.getElementById('edit-price').value;
    const price = parseFloat(priceVal);
    if (priceVal === '' || isNaN(price) || price < 0) {
        showMsg(document.getElementById('edit-msg'), '价格必须大于等于0', true);
        return;
    }
    try {
        const res = await ItemAPI.update(id, {
            title: document.getElementById('edit-title').value,
            description: document.getElementById('edit-description').value,
            price: price,
            category: document.getElementById('edit-category').value,
            conditionLevel: parseInt(document.getElementById('edit-conditionLevel').value, 10),
            images: editUploadedImages.join(',')
        });
        itemData = res.data;
        renderDetail(itemData);
        cancelEdit();
        alert('修改成功，等待重新审核');
        location.reload();
    } catch (e) { showMsg(document.getElementById('edit-msg'), e.message, true); }
}

async function hasPurchased(itemId) {
    if (!user) return false;
    try {
        const data = await OrderAPI.list(1, 100);
        return data.rows.some(o => o.itemId === itemId && o.buyerId === user.userId && o.status > 0);
    } catch (e) {
        return false;
    }
}

(async () => {
    const res = await ItemAPI.detail(id);
    itemData = res.data;
    renderDetail(itemData);

    if (user && user.role === 1 && reportId) {
        const rRes = await ReportAPI.detail(reportId);
        const r = rRes.data;
        document.getElementById('report-panel').style.display = 'block';
        document.getElementById('report-info').innerHTML =
            `举报人：${r.reporterNickname} | 原因：${r.reason}`;
    }

    let actions = '';
    const purchased = await hasPurchased(parseInt(id));
    if (user && itemData.status === 1 && itemData.sellerId !== user.userId && !purchased) {
        actions += `<button class="btn btn-primary" onclick="buyItem()">立即购买</button> `;
    }
    if (user && itemData.sellerId !== user.userId) {
        actions += `<button class="btn btn-default" onclick="contactSeller(${itemData.sellerId})">联系卖家</button> `;
    }
    if (user && itemData.sellerId === user.userId) {
        actions += `<button class="btn btn-primary" onclick="showEditForm()">修改帖子</button> `;
    }
    if (user && itemData.sellerId !== user.userId && !(user.role === 1 && reportId)) {
        actions += `<button class="btn btn-warning" onclick="reportItem()">举报</button>`;
    }
    document.getElementById('actions').innerHTML = actions || '<p>请先登录后进行操作</p>';
})();

async function buyItem() {
    if (!requireLogin()) return;
    try {
        await OrderAPI.create(id);
        alert('下单成功！');
        location.href = 'orders.html';
    } catch (e) { alert(e.message); }
}
function contactSeller(sellerId) {
    if (!requireLogin()) return;
    location.href = 'messages.html?peerId=' + sellerId;
}
async function reportItem() {
    const reason = prompt('请输入举报原因：');
    if (!reason) return;
    try {
        await ReportAPI.submit({ targetType: 'ITEM', targetId: parseInt(id), reason });
        alert('举报已提交');
    } catch (e) { alert(e.message); }
}
async function handleReport(action) {
    const label = action === 'REMOVE' ? '审核下架' : '审核无违规';
    if (!confirm(`确定执行「${label}」？`)) return;
    try {
        await ReportAPI.handle(reportId, action);
        alert('处理成功，已通知发布者和举报者');
        location.href = 'admin-panel.html';
    } catch (e) { alert(e.message); }
}
</script>
</body>
</html>
